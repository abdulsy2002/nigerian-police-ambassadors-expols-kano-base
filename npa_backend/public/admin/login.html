<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login - NPA EXPOLS</title>
  <link rel="stylesheet" href="login.css">
    
</head>
<body>
  <div class="box">
    <img src="../../profile.jpeg" class="logo" onerror="this.src='https://via.placeholder.com/80?text=NP'">
    <h2>🔐 Admin Login</h2>
    <form id="adminLoginForm">
      <input type="email" name="email" placeholder="Admin Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit" id="loginBtn">Login</button>
      <div id="errorMsg" class="msg error"></div>
      <div id="successMsg" class="msg success"></div>
    </form>
    <div class="link"><a href="../login.html">← Back to User Login</a></div>
  </div>
  <script src="login.js"></script>
</body>
</html>
