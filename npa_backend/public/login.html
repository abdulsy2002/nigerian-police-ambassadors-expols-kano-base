<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - NPA EXPOLS</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="logo-section">
        <img src="profile.jpeg" alt="NPA EXPOLS Logo" class="logo" onerror="this.src='https://via.placeholder.com/100?text=NP'">
        <h1>🔐 Login</h1>
        <p class="subtitle">Welcome back to NPA EXPOLS Kano Base</p>
      </div>
      
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required autocomplete="email">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        
        <button type="submit" class="btn-login" id="loginBtn">Login</button>
        <div id="message" class="message"></div>
      </form>
      
      <div class="footer-links">
        <p>Don't have an account? <a href="/register">Create Account</a></p>
        <p><a href="admin/login.html">Admin Login</a></p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const btn = document.getElementById('loginBtn');
      const msg = document.getElementById('message');
      
      btn.disabled = true;
      btn.textContent = 'Logging in...';
      msg.className = 'message';
      msg.textContent = '';
      
      try {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ email, password })
        });
        
        const result = await response.json();
        
        if (result.success && result.redirect) {
          msg.textContent = '✅ Login successful! Redirecting...';
          msg.className = 'message success';
          setTimeout(() => {
            window.location.href = result.redirect;
          }, 800);
        } else {
          msg.textContent = result.message || 'Invalid credentials';
          msg.className = 'message error';
        }
      } catch (err) {
        msg.textContent = 'Network error. Is server running?';
        msg.className = 'message error';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
