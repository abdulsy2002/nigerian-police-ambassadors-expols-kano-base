<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - NPA EXPOLS</title>
 
  <link rel="stylesheet" href="register.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="profile.jpeg" alt="Logo" onerror="this.src='https://via.placeholder.com/80?text=NP'">
      </div>
      <h2>Create Account</h2>
      <p class="subtitle">Join NPA EXPOLS Kano Base. Requires admin authorization code.</p>
      
      <form id="registerForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email">
        </div>
        
        <div class="form-group">
          <label for="password">Create Password</label>
          <input type="password" id="password" name="password" required placeholder="••••••••" minlength="6" autocomplete="new-password">
        </div>
        
        <div class="form-group">
          <label for="authCode">Admin Auth Code <span class="required">*</span></label>
          <input type="text" id="authCode" name="authCode" required placeholder="XXXXXX" maxlength="6" pattern="[A-Za-z0-9]{6}" style="text-transform: uppercase; letter-spacing: 2px; font-family: monospace;">
          <small class="form-hint">Contact admin to get your authorization code</small>
        </div>
        
        <button type="submit" id="submitBtn" class="btn btn-primary">Submit Registration</button>
        <div id="message" class="message"></div>
      </form>
      
      <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
    </div>
  </div>
  
  <script src="register.js"></script>
</body>
</html>
